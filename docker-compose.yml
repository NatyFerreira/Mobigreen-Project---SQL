services:
  postgres:
    build: .
    container_name: mobigreen_postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./init/00_postgresql.conf:/etc/postgresql/postgresql.conf:ro

    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - mobigreen_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mobigreen_pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "127.0.0.1:5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - mobigreen_net

volumes:
  postgres_data:

networks:
  mobigreen_net:
    driver: bridge
